<!DOCTYPE html>
<html>
<head>
<title>Add Internship</title>

<style>
body{font-family:Arial;background:#eef2f7;}
.container{
background:white;
padding:20px;

margin:auto;

border-radius:10px;
}
input,button{width:100%;padding:10px;margin:5px 0;}
button{background:#4facfe;color:white;border:none;}
.item{background:#f0f6ff;padding:10px;margin:10px 0;}
</style>

</head>

<body>

<h2 style="text-align:center;">Add Internship</h2>

<div class="container">

<input id="company" placeholder="Company">
<input id="role" placeholder="Role">
<input id="location" placeholder="Location">
<input id="duration" placeholder="Duration">
<input id="startDate" type="date">
<input id="stipend" placeholder="Stipend">
<input id="slots" type="number" placeholder="Slots">

<button onclick="addInternship()">Add</button>

<div id="list"></div>

</div>

<script src="addinternship.js"></script>

</body>
</html>
