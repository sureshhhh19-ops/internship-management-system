<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Internship Management System</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
background-image:url("https://learn.kletech.ac.in/theme/image.php/university/theme_university/1712427483/loginbackgroundimage");
background-size:cover;
background-position:center;
}


header{
width:100%;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.9);
}

header img{
width:150px;
}

header h1{
font-size:28px;
}


.nav-buttons button{
margin-left:10px;
padding:8px 15px;
border:none;
background:#4facfe;
color:white;
border-radius:5px;
cursor:pointer;
}

.nav-buttons button:hover{
background:#0077ff;
}


.container{
margin-top:40px;
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:15px;
}

select, input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button.submit{
width:100%;
padding:10px;
background:#4facfe;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button.submit:hover{
background:#0077ff;
}
</style>
</head>

<body>

<header>
<img src="https://learn.kletech.ac.in/theme/image.php/university/theme_university/1712427483/logo">
<h1>Internship Management System</h1>

<div class="nav-buttons">
<button onclick="showLogin()">Login</button>
<button onclick="showRegister()">Register</button>
</div>
</header>

<div class="container">

<h2 id="formTitle">Login</h2>

<!-- LOGIN -->
<form id="loginForm">

<select id="loginRole" required>
<option value="" disabled selected>Select Role</option>
<option value="student">Student</option>
<option value="mentor">Mentor</option>
<option value="hod">HOD</option>
<option value="coordinator">Coordinator</option>
</select>

<input type="text" id="loginUSN" placeholder="USN" required>
<input type="password" id="loginPassword" placeholder="Password" required>

<button type="submit" class="submit">Login</button>

</form>

<!-- REGISTER -->
<form id="registerForm" style="display:none;">

<select id="regRole" required>
<option value="">Select Role</option>
<option value="student">Student</option>
<option value="mentor">Mentor</option>
<option value="hod">HOD</option>
<option value="coordinator">Coordinator</option>
</select>

<input type="text" id="regUSN" placeholder="USN" required>
<input type="email" id="regEmail" placeholder="Email" required>

<input type="password" id="regPassword" placeholder="Password" required>
<input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>

<button type="submit" class="submit">Register</button>

</form>

</div>

<script src="se.js"></script>

</body>
</html>
