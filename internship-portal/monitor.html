<!DOCTYPE html>
<html>
<head>
<title>Monitor</title>

<style>
body{font-family:Arial;background:#eef2f7;}
table{
width:80%;
margin:auto;
background:white;
border-collapse:collapse;
}
td,th{padding:10px;border:1px solid #ddd;}
button{padding:5px;}
</style>

</head>

<body>

<h2 style="text-align:center;">Applications</h2>

<table>
<tr>
<th>Name</th>
<th>USN</th>
<th>Internship</th>
<th>Status</th>
<th>Action</th>
</tr>

<tbody id="body"></tbody>

</table>

<script>

function load(){

let apps = JSON.parse(localStorage.getItem("applications")) || [];
body.innerHTML = "";

apps.forEach((a,i)=>{

body.innerHTML += `
<tr>
<td>${a.name}</td>
<td>${a.usn}</td>
<td>${a.internship}</td>
<td>${a.status}</td>
<td>
<button onclick="approve(${i})">Approve</button>
<button onclick="reject(${i})">Reject</button>
</td>
</tr>`;
});

}

function approve(i){
let apps = JSON.parse(localStorage.getItem("applications"));
apps[i].status="Approved";
localStorage.setItem("applications", JSON.stringify(apps));
load();
}

function reject(i){
let apps = JSON.parse(localStorage.getItem("applications"));
apps[i].status="Rejected";
localStorage.setItem("applications", JSON.stringify(apps));
load();
}

load();

</script>

</body>
</html>
